<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Volume Control</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: #1a1a1a;
            color: #fff;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            height: 100vh;
            overflow: hidden;
            user-select: none;
        }
        
        /* === КАСТОМНЫЙ ЗАГОЛОВОК === */
        .custom-titlebar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            height: 38px;
            background: #141414;
            display: flex;
            align-items: center;
            padding: 0 12px;
            user-select: none;
            -webkit-app-region: drag;
            border-bottom: 1px solid #2a2a2a;
            z-index: 1000;
        }
        
        .custom-titlebar .icon {
            width: 20px;
            height: 20px;
            border-radius: 4px;
            margin-right: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            background: rgba(255,255,255,0.05);
            overflow: hidden;
        }
        
        .custom-titlebar .icon img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .custom-titlebar .title {
            flex: 1;
            font-size: 13px;
            font-weight: 600;
            color: #ddd;
            -webkit-app-region: drag;
        }
        
        .custom-titlebar .controls {
            display: flex;
            gap: 8px;
            -webkit-app-region: no-drag;
        }
        
        .custom-titlebar .controls button {
            background: none;
            border: none;
            color: #666;
            font-size: 14px;
            cursor: pointer;
            padding: 2px 6px;
            border-radius: 4px;
            transition: all 0.2s;
            line-height: 1;
        }
        
        .custom-titlebar .controls button:hover {
            background: rgba(255,255,255,0.08);
            color: #fff;
        }
        
        .custom-titlebar .controls .close-btn:hover {
            background: #ff4444;
            color: #fff;
        }
        
        /* === КОНТЕНТ === */
        .container {
            margin-top: 38px;
            padding: 20px;
            height: calc(100% - 38px);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        
        .knob-container {
            position: relative;
            width: 150px;
            height: 150px;
            margin-bottom: 16px;
        }
        
        .knob {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: radial-gradient(circle at 35% 35%, #2a2a2a, #0a0a0a);
            border: 3px solid #333;
            position: relative;
            cursor: pointer;
            touch-action: none;
            transition: border-color 0.3s;
            box-shadow: 
                0 8px 32px rgba(0,0,0,0.6),
                inset 0 -4px 12px rgba(0,0,0,0.4),
                inset 0 4px 12px rgba(255,255,255,0.05);
        }
        
        .knob:hover {
            border-color: var(--accent, #1DB954);
        }
        
        .knob::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 20px;
            height: 20px;
            background: radial-gradient(circle, #333, #111);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.5);
        }
        
        .knob-indicator {
            position: absolute;
            top: 8px;
            left: 50%;
            width: 4px;
            height: 28px;
            background: var(--accent, #1DB954);
            border-radius: 2px;
            transform-origin: bottom center;
            transform: translateX(-50%) rotate(0deg);
            transition: background 0.3s, transform 0.05s linear;
            box-shadow: 0 0 12px var(--accent-glow, rgba(29, 185, 84, 0.3));
        }
        
        .knob-value {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            font-size: 26px;
            font-weight: 700;
            color: #fff;
            z-index: 2;
            text-shadow: 0 2px 8px rgba(0,0,0,0.8);
        }
        
        .knob-value .percent {
            font-size: 13px;
            color: #666;
        }
        
        .buttons {
            display: flex;
            gap: 12px;
            margin-top: 8px;
        }
        
        .buttons button {
            padding: 6px 16px;
            border: none;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .btn-mute {
            background: rgba(255,255,255,0.08);
            color: #fff;
        }
        
        .btn-mute:hover {
            background: rgba(255,255,255,0.14);
        }
        
        .btn-mute.active {
            background: #ff4444;
            color: #fff;
        }
        
        .btn-reset {
            background: rgba(255,255,255,0.05);
            color: #666;
        }
        
        .btn-reset:hover {
            background: rgba(255,255,255,0.1);
            color: #fff;
        }
        
        .status {
            margin-top: 12px;
            padding: 6px 12px;
            background: rgba(255,255,255,0.03);
            border-radius: 6px;
            font-size: 12px;
            color: #666;
            border: 1px solid rgba(255,255,255,0.05);
            width: 100%;
            max-width: 200px;
            text-align: center;
        }
        
        .status .current {
            color: #fff;
            font-weight: 600;
        }
        
        .knob.dragging {
            border-color: var(--accent, #1DB954);
            box-shadow: 0 0 30px rgba(29, 185, 84, 0.15);
        }
        
        .knob.dragging .knob-indicator {
            box-shadow: 0 0 20px var(--accent-glow, rgba(29, 185, 84, 0.5));
        }
        
        @media (max-width: 400px) {
            .knob-container {
                width: 120px;
                height: 120px;
            }
            .knob-value {
                font-size: 20px;
            }
            .knob-indicator {
                height: 22px;
                top: 6px;
            }
        }
    </style>
</head>
<body>
    <!-- КАСТОМНЫЙ ЗАГОЛОВОК -->
    <div class="custom-titlebar">
        <div class="icon">🎛️</div>
        <span class="title">Volume Control</span>
        <div class="controls">
            <button class="close-btn" onclick="window.close()">✕</button>
        </div>
    </div>
    
    <!-- КОНТЕНТ -->
    <div class="container">
        <div class="knob-container">
            <div class="knob" id="knob">
                <div class="knob-indicator" id="knobIndicator"></div>
                <div class="knob-value" id="knobValue">
                    50<span class="percent">%</span>
                </div>
            </div>
        </div>
        
        <div class="buttons">
            <button class="btn-mute" id="muteBtn">🔇 Mute</button>
            <button class="btn-reset" id="resetBtn">↺ 50%</button>
        </div>
        
        <div class="status" id="status">
            🎵 Громкость: <span class="current" id="currentVolume">50%</span>
        </div>
    </div>
    
    <script>
        // === ЛОГИКА КРУТИЛКИ (такая же как была) ===
        const knob = document.getElementById('knob');
        const indicator = document.getElementById('knobIndicator');
        const knobValue = document.getElementById('knobValue');
        const currentVolume = document.getElementById('currentVolume');
        const muteBtn = document.getElementById('muteBtn');
        const resetBtn = document.getElementById('resetBtn');
        const status = document.getElementById('status');
        
        let volume = 50;
        let isDragging = false;
        let isMuted = false;
        let previousVolume = 50;
        
        const MIN_ANGLE = -150;
        const MAX_ANGLE = 150;
        
        function updateVolume(value) {
            volume = Math.max(0, Math.min(100, Math.round(value)));
            
            const angle = MIN_ANGLE + (volume / 100) * (MAX_ANGLE - MIN_ANGLE);
            indicator.style.transform = `translateX(-50%) rotate(${angle}deg)`;
            
            knobValue.innerHTML = `${volume}<span class="percent">%</span>`;
            currentVolume.textContent = `${volume}%`;
            
            const color = volume > 70 ? '#ff6b6b' : volume > 30 ? '#1DB954' : '#ffaa00';
            indicator.style.background = color;
            document.documentElement.style.setProperty('--accent', color);
            document.documentElement.style.setProperty('--accent-glow', color + '44');
            
            status.innerHTML = isMuted ? 
                `🔇 Звук выключен <span class="current">(${volume}%)</span>` : 
                `🎵 Громкость: <span class="current">${volume}%</span>`;
            
            sendVolume(volume);
        }
        
        function toggleMute() {
            isMuted = !isMuted;
            if (isMuted) {
                previousVolume = volume;
                muteBtn.textContent = '🔊 Unmute';
                muteBtn.classList.add('active');
                updateVolume(0);
            } else {
                muteBtn.textContent = '🔇 Mute';
                muteBtn.classList.remove('active');
                updateVolume(previousVolume || 50);
            }
        }
        
        function resetVolume() {
            if (isMuted) {
                isMuted = false;
                muteBtn.textContent = '🔇 Mute';
                muteBtn.classList.remove('active');
            }
            updateVolume(50);
        }
        
        function sendVolume(value) {
            fetch('http://localhost:9876/set-volume', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ volume: value / 100 })
            }).catch(() => {
                if (window.parent && window.parent.electronAPI) {
                    window.parent.electronAPI.setMusicHubVolume(value / 100);
                }
            });
        }
        
        function getAngle(clientX, clientY) {
            const rect = knob.getBoundingClientRect();
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;
            return Math.atan2(clientY - centerY, clientX - centerX) * (180 / Math.PI);
        }
        
        function handleStart(e) {
            e.preventDefault();
            isDragging = true;
            knob.classList.add('dragging');
        }
        
        function handleMove(e) {
            if (!isDragging) return;
            e.preventDefault();
            const clientX = e.clientX || e.touches?.[0]?.clientX;
            const clientY = e.clientY || e.touches?.[0]?.clientY;
            if (clientX === undefined) return;
            
            let angle = getAngle(clientX, clientY);
            if (angle > 90) angle = 90;
            if (angle < -90) angle = -90;
            
            const value = ((angle + 90) / 180) * 100;
            updateVolume(value);
        }
        
        function handleEnd() {
            if (isDragging) {
                isDragging = false;
                knob.classList.remove('dragging');
            }
        }
        
        knob.addEventListener('mousedown', handleStart);
        document.addEventListener('mousemove', handleMove);
        document.addEventListener('mouseup', handleEnd);
        
        knob.addEventListener('touchstart', handleStart, { passive: false });
        document.addEventListener('touchmove', handleMove, { passive: false });
        document.addEventListener('touchend', handleEnd);
        
        muteBtn.addEventListener('click', toggleMute);
        resetBtn.addEventListener('click', resetVolume);
        
        knob.addEventListener('wheel', (e) => {
            e.preventDefault();
            updateVolume(volume + (e.deltaY > 0 ? -2 : 2));
        }, { passive: false });
        
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowUp') { e.preventDefault(); updateVolume(volume + 5); }
            if (e.key === 'ArrowDown') { e.preventDefault(); updateVolume(volume - 5); }
            if (e.key === 'm' || e.key === 'M') toggleMute();
            if (e.key === 'r' || e.key === 'R') resetVolume();
        });
        
        updateVolume(50);
        console.log('🎛️ Volume Control Plugin loaded!');
    </script>
</body>
</html>
